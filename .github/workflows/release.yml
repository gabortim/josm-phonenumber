name: Release

on:
  push:
    tags:
      - "[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:

permissions:
  contents: write

env:
  JAVA_VERSION: '21'
  JAVA_DIST: 'zulu'

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Validate SemVer
        id: semver
        shell: bash
        run: |
          # strip the leading 'v' if present (v1.0.0 -> 1.0.0)
          VERSION=${GITHUB_REF_NAME#v}
          echo "Validating version: $VERSION"

          # Major.Minor.Patch (Stable)
          STABLE_PATTERN="^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$"

          # Major.Minor.Patch-Prerelease (Prerelease)
          PRE_PATTERN="^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)-((0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*)(\.(0|[1-9][0-9]*|[0-9]*[a-zA-Z-][0-9a-zA-Z-]*))*)$"

          if [[ "$VERSION" =~ $STABLE_PATTERN ]]; then
            echo "✅ Version $VERSION is STABLE."
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          elif [[ "$VERSION" =~ $PRE_PATTERN ]]; then
            echo "⚠️ Version $VERSION is a PRERELEASE."
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Error: Version $VERSION does not strictly follow SemVer (https://semver.org)."
            exit 1
          fi

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v5
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: ${{ env.JAVA_DIST }}

      - name: Install System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gettext

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v5
        with:
          dependency-graph: generate-and-submit

      - name: Build Artifacts
        run: ./gradlew check dist generatePot
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          body: For summarised changes, see [CHANGELOG.md](CHANGELOG.md).
          fail_on_unmatched_files: true
          prerelease: ${{ steps.semver.outputs.is_prerelease }}
          files: |
            build/dist/*.jar
            build/i18n/pot/*.pot